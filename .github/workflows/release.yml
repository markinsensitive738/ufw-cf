name: release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev
      - name: Build .deb
        run: ./scripts/build-deb.sh
      - name: Stage install.sh for release
        run: cp scripts/install-release.sh dist/install.sh
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/install.sh
          generate_release_notes: true
