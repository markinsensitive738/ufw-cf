name: test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: |
          shellcheck bin/ufw-cf
          shellcheck install.sh uninstall.sh
          shellcheck scripts/*.sh
          shellcheck debian/DEBIAN/postinst debian/DEBIAN/prerm debian/DEBIAN/postrm

  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats curl
      - name: Run tests
        run: bats tests

  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y ufw curl
      - name: Stage install with DESTDIR
        run: sudo make install DESTDIR=/tmp/stage
      - name: Verify files were installed
        run: |
          test -x /tmp/stage/usr/local/bin/ufw-cf
          test -f /tmp/stage/etc/systemd/system/ufw-cf.service
          test -f /tmp/stage/etc/systemd/system/ufw-cf.timer
          test -f /tmp/stage/etc/ufw-cf/config
      - name: Smoke-test the binary
        run: |
          /tmp/stage/usr/local/bin/ufw-cf --version
          /tmp/stage/usr/local/bin/ufw-cf --help

  deb:
    runs-on: ubuntu-latest
    needs: [shellcheck, bats]
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev lintian
      - name: Build .deb
        run: ./scripts/build-deb.sh
      - name: Inspect package
        run: |
          dpkg-deb --info dist/*.deb
          dpkg-deb --contents dist/*.deb
      - name: Lint package (warnings only)
        run: lintian dist/*.deb || true
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ufw-cf-deb
          path: dist/*.deb
